env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 170
    lines: 45

# Font configuration
font:
  normal:
    family: "JetBrainsMono"
  bold:
    family: "JetBrainsMono"
  italic:
    family: "JetBrainsMono"
  size: 11.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

# Base16 Gruvbox dark, hard - alacritty color config
# Dawid Kurek (dawikur@gmail.com), morhetz (https://github.com/morhetz/gruvbox)
# Base16 Nord 256 - alacritty color config
# arcticicestudio
colors:
  # Default colors
  primary:
    background: '0x2e3440'
    foreground: '0xe5e9f0'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x2e3440'
    cursor: '0xe5e9f0'

  # Normal colors
  normal:
    black:   '0x2e3440'
    red:     '0x88c0d0'
    green:   '0xbf616a'
    yellow:  '0x5e81ac'
    blue:    '0xebcb8b'
    magenta: '0xa3be8c'
    cyan:    '0xd08770'
    white:   '0xe5e9f0'

  # Bright colors
  bright:
    black:   '0x4c566a'
    red:     '0x88c0d0'
    green:   '0xbf616a'
    yellow:  '0x5e81ac'
    blue:    '0xebcb8b'
    magenta: '0xa3be8c'
    cyan:    '0xd08770'
    white:   '0x8fbcbb'

  indexed_colors:
    - { index: 16, color: '0x81a1c1' }
    - { index: 17, color: '0xb48ead' }
    - { index: 18, color: '0x3b4252' }
    - { index: 19, color: '0x434c5e' }
    - { index: 20, color: '0xd8dee9' }
    - { index: 21, color: '0xeceff4' }

draw_bold_text_with_bright_colors: false

# Values for `animation`:
#   - Ease
#   - EaseOut
#   - EaseOutSine
#   - EaseOutQuad
#   - EaseOutCubic
#   - EaseOutQuart
#   - EaseOutQuint
#   - EaseOutExpo
#   - EaseOutCirc
#   - Linear
#
# Specifying a `duration` of `0` will disable the visual bell.
bell:
  animation: EaseOutExpo
  duration: 0
  color: '0xffffff'

# Background opacity
#
# Window opacity as a floating point number from `0.0` to `1.0`.
# The value `0.0` is completely transparent and `1.0` is opaque.
background_opacity: 0.98

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>"
  save_to_clipboard: false

cursor:
  style: Beam
  unfocused_hollow: true

live_config_reload: true

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: true

mouse_bindings:
  - { mouse: Middle, action: PasteSelection }
